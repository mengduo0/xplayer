<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XPlayer</title>
    <script>
      (function () {
        var t = localStorage.getItem('xplayer-theme');
        document.documentElement.setAttribute('data-theme', t === 'aurora' ? 'aurora' : 'light');
      })();
    </script>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="starfield" class="starfield-canvas" aria-hidden="true"></canvas>
    <div id="app">
      <header class="top-bar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div class="brand-text">
            <h1>XPlayer</h1>
            <span class="brand-sub">本地媒体中心</span>
          </div>
        </div>
        <div class="top-bar-actions">
          <button
            type="button"
            id="theme-toggle"
            class="theme-toggle"
            data-testid="theme-toggle"
            title="切换主题"
            aria-label="切换主题"
          >
            <span class="theme-toggle-icon theme-icon-light" aria-hidden="true">☀</span>
            <span class="theme-toggle-icon theme-icon-aurora" aria-hidden="true">✦</span>
          </button>
          <span id="status" class="status" data-testid="backend-status">连接中…</span>
        </div>
      </header>

      <main class="layout">
        <section class="player-panel">
          <div class="player-stage">
            <video
              id="player"
              data-testid="video-player"
              controls
              playsinline
              preload="metadata"
            ></video>
            <div class="player-gradient" aria-hidden="true"></div>
          </div>
          <div class="player-meta">
            <div class="local-toolbar">
              <input
                id="local-file-input"
                type="file"
                accept="video/*,.mp4,.mkv,.webm,.ts,.avi,.mov"
                hidden
                data-testid="local-file-input"
              />
              <button
                type="button"
                id="open-local-btn"
                class="btn btn-secondary"
                data-testid="open-local-file"
              >
                打开本地文件
              </button>
              <button
                type="button"
                id="add-local-btn"
                class="btn btn-outline"
                data-testid="add-local-to-playlist"
                disabled
                title="将当前本地文件按文件名加入列表（需文件在 G:/mv 目录）"
              >
                加入播放列表
              </button>
            </div>
            <p id="now-playing" class="now-playing">请选择列表中的视频</p>
            <span id="now-playing-hint">支持从资源管理器选择本地视频即时播放</span>
          </div>
        </section>

        <aside class="playlist-panel">
          <div class="playlist-header">
            <h2>播放列表</h2>
            <span id="playlist-count" class="playlist-count">—</span>
          </div>

          <p id="add-error" class="form-error" hidden data-testid="add-error"></p>

          <ul id="playlist" class="playlist" data-testid="playlist"></ul>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
