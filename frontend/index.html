<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XPlayer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="top-bar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div class="brand-text">
            <h1>XPlayer</h1>
            <span class="brand-sub">本地媒体中心</span>
          </div>
        </div>
        <span id="status" class="status" data-testid="backend-status">连接中…</span>
      </header>

      <main class="layout">
        <section class="player-panel">
          <div class="player-stage">
            <video
              id="player"
              data-testid="video-player"
              controls
              playsinline
              preload="metadata"
            ></video>
            <div class="player-gradient" aria-hidden="true"></div>
          </div>
          <div class="player-meta">
            <p id="now-playing" class="now-playing">请选择列表中的视频</p>
            <span class="now-playing-hint">支持进度拖拽 · 列表切换即时播放</span>
          </div>
        </section>

        <aside class="playlist-panel">
          <div class="playlist-header">
            <h2>播放列表</h2>
            <span id="playlist-count" class="playlist-count">—</span>
          </div>

          <form id="add-form" class="add-form" data-testid="add-form">
            <input
              id="add-file"
              class="add-input"
              type="text"
              placeholder="文件名，如 1.mp4"
              data-testid="add-file"
              required
            />
            <input
              id="add-title"
              class="add-input"
              type="text"
              placeholder="标题（可选）"
              data-testid="add-title"
            />
            <button type="submit" class="btn btn-primary" data-testid="add-submit">添加</button>
          </form>
          <p id="add-error" class="form-error" hidden data-testid="add-error"></p>

          <ul id="playlist" class="playlist" data-testid="playlist"></ul>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
